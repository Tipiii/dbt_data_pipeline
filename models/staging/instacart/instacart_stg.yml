version: 2

models:
  - name: stg_aisles
    description: "Bang staging cho aisles"
    columns:
      - name: aisle_id
        description: "Ma so cua aisle"
        tests:
          - not_null
          - unique

  - name: stg_departments
    description: "Bang staging cho departments"
    columns:
      - name: department_id
        description: "Ma so cua department"
        tests:
          - not_null
          - unique

  - name: stg_orders
    description: "Bang staging cho orders"
    columns:
      - name: order_id
        description: "Ma so cua order"
        tests:
          - not_null
          - unique

  - name: stg_products
    description: "Bang staging cho products"
    columns:
      - name: product_id
        description: "Ma so cua product"
        tests:
          - not_null
          - unique

  - name: stg_order_products_prior
    description: "Bang staging cho order_products_prior"
    columns:
      - name: order_id
        description: "Ma so cua order"
        tests:
          - not_null
      - name: product_id
        description: "Ma so cua product"
        tests:
          - not_null

  - name: stg_order_products_train
    description: "Bang staging cho order_products_train"
    columns:
      - name: order_id
        description: "Ma so cua order"
        tests:
          - not_null
      - name: product_id
        description: "Ma so cua product"
        tests:
          - not_null
